server:
  port: 8080

spring:
  application:
    name: contact-backend
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USERNAME:your-email@gmail.com}
    password: ${GMAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        connectiontimeout: 5000
        timeout: 5000
        writetimeout: 5000

# Destination address where inquiries will be received
admin:
  email: ${ADMIN_EMAIL:your-email@gmail.com}

